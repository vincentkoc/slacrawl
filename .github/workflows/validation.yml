name: Validation

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/slacrawl

      - name: Smoke test CLI help
        run: |
          set -euo pipefail
          output="$(go run ./cmd/slacrawl --help 2>&1 || true)"
          printf '%s\n' "$output"
          printf '%s' "$output" | grep -q "Usage of slacrawl:"
