name: Validation

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build -ldflags "-X github.com/vincentkoc/slacrawl/internal/cli.version=ci" -o bin/slacrawl ./cmd/slacrawl

      - name: Smoke test CLI control surface
        run: |
          set -euo pipefail
          output="$(./bin/slacrawl --help 2>&1 || true)"
          printf '%s\n' "$output"
          printf '%s' "$output" | grep -q "Usage of slacrawl:"
          printf '%s' "$output" | grep -q "metadata"
          printf '%s' "$output" | grep -q "tui"
          test "$(./bin/slacrawl --version)" = "ci"
          ./bin/slacrawl metadata --json | grep -q '"schema_version"'
          cfg="$RUNNER_TEMP/slacrawl.toml"
          db="$RUNNER_TEMP/slacrawl.db"
          ./bin/slacrawl --config "$cfg" init --db "$db"
          ./bin/slacrawl --config "$cfg" status --json | grep -q '"databases"'
          ./bin/slacrawl --config "$cfg" tui --json --limit 1 | grep -q '^\['
